<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frigelis Admin — Services</title>
  <link rel="icon" href="../assets/img/logo-icon.png" type="image/png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><img src="../assets/img/logo-icon.png" alt="F"><div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.05rem;color:white;letter-spacing:.08em">FRIGELIS</div><span class="sb-logo-sub">Back-office</span></div></div>
  <nav class="sb-nav">
    <a class="sb-link" href="index.html"><span class="ico">📊</span>Dashboard</a>
    <a class="sb-link active" href="services.html"><span class="ico">🔧</span>Services</a>
    <a class="sb-link" href="avis.html"><span class="ico">⭐</span>Avis clients</a>
    <a class="sb-link" href="messages.html"><span class="ico">✉️</span>Messages</a>
    <a class="sb-link" href="settings.html"><span class="ico">⚙️</span>Paramètres</a>
  </nav>
  <div class="sb-bottom"><a href="../index.html" class="sb-back">← Retour au site</a></div>
</aside>
<main class="admin-main">
  <div class="adm-top"><h1>Services</h1></div>

  <div class="add-form">
    <h3>➕ Ajouter un service</h3>
    <div class="form-row" style="margin-bottom:1rem">
      <div class="form-group"><label class="form-label">Titre *</label><input class="form-input" id="s-title" placeholder="Dépannage Climatisation"></div>
      <div class="form-group"><label class="form-label">Prix</label><input class="form-input" id="s-price" placeholder="À partir de 65 €"></div>
    </div>
    <div class="form-row" style="margin-bottom:1rem">
      <div class="form-group"><label class="form-label">Icône (emoji)</label><input class="form-input" id="s-icone" placeholder="❄️" style="font-size:1.4rem;width:70px"></div>
      <div class="form-group"><label class="form-label">Description</label><input class="form-input" id="s-desc" placeholder="Description du service…"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="admAddSvc()">Ajouter</button>
  </div>

  <div class="panel">
    <div class="panel-h"><h3>Tous les services</h3></div>
    <div style="overflow-x:auto">
      <table><thead><tr><th>Icône</th><th>Titre</th><th>Prix</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="svc-tbody"><tr><td colspan="5" style="text-align:center;padding:2rem;color:#94a3b8">Chargement…</td></tr></tbody></table>
    </div>
  </div>
</main>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script type="module">
import { checkAdminAuth } from '../js/app.js';
import { loadAdminServices } from '../js/admin.js';
if (!checkAdminAuth()) throw new Error('auth');
loadAdminServices();
</script>
</body>
</html>
